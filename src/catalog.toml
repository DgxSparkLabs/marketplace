# catalog.toml — bundle definitions ONLY
#
# After the DI refactor (see docs/archive/di-refactor/PLAN_DI_REFACTOR.md), this
# file contains ONLY [bundle.*] blocks. Construct types and platforms are
# defined in code (scripts/constructs.py, scripts/platforms.py).
#
# Bundle member syntax: "<kind>:<name>"
#   skill:telegram-notify       → individual plugin "skill-telegram-notify"
#   rule:no-ai-credit           → individual plugin "rule-no-ai-credit"
#   bundle:communication-skills → bundle plugin "bundle-communication-skills"
#
# Per-construct catch-all bundles (bundle-skill-all, bundle-agent-all, ...) were
# retired 2026-05-27 — they cluttered the marketplace listing without adding
# curation value. The catalog may use any name now, including the old <prefix>-all
# form if you want it back for a specific construct.
#
# Then run: uv run scripts/generate_manifest.py

# ─── Minimal-stable-state notice ─────────────────────────────────────────────
#
# 2026-05-26: every skill domain bundle and every rule domain bundle was
# removed during the minimal-stable-state refactor (refactor/minimal-stable-state
# branch, see CHANGELOG). Their member plugins were archived to
# docs/archive/{skills,rules}-pre-stable-2026-05-26/. The bundles will be
# re-introduced one at a time as each skill or rule is re-verified on every
# platform and added back to its source directory.
#
# What remains is the cross-construct examples bundle below: one-of-each
# install so a new operator can install every construct type from a single
# command and study the reference implementations. It is intentionally a
# multi-member bundle that does not depend on archived content.

# ─── Cross-construct examples bundle ─────────────────────────────────────────

[bundle.examples]
description = "Reference examples — install to study every construct type. Each Claude-supported construct ships both example-single and example-multi (hooks ship nine per-event plus example-multi)."
members = [
  "skill:example-single",
  "skill:example-multi",
  "rule:example",
  "command:example-single",
  "command:example-multi",
  "agent:example-single",
  "agent:example-multi",
  "mcp:example-single",
  "mcp:example-multi",
  "lsp:example-single",
  "lsp:example-multi",
  "monitor:example-single",
  "monitor:example-multi",
  "output-style:example-single",
  "output-style:example-multi",
  "theme:example-single",
  "theme:example-multi",
  "hook:example-userpromptsubmit",
  "hook:example-pretooluse",
  "hook:example-posttooluse",
  "hook:example-notification",
  "hook:example-stop",
  "hook:example-subagentstop",
  "hook:example-sessionstart",
  "hook:example-sessionend",
  "hook:example-precompact",
  "hook:example-multi",
]

# ─── Per-construct catch-all bundles retired ─────────────────────────────────
#
# Pre-2026-05-27: the generator emitted bundle-<prefix>-all per construct
# (decisions #23, #25 in the DI refactor plan). These were dropped because
# they doubled the marketplace entry count without curation value — a
# `bundle-skill-all` that contains "every skill" is just a noisier view of
# `claude plugin list --available` filtered on prefix. The cross-construct
# `bundle.examples` above remains as the one curated multi-member bundle.
