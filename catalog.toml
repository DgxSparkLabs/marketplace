# catalog.toml — bundle definitions ONLY
#
# After the DI refactor (see docs/archive/di-refactor/PLAN_DI_REFACTOR.md), this file contains
# ONLY [bundle.*] blocks. Construct types, platforms, and catch-all bundles
# are defined in code (scripts/constructs.py, scripts/platforms.py,
# scripts/generate_manifest.py Phase 2b) — not in configuration files.
#
# Bundle member syntax: "<kind>:<name>"
#   skill:telegram-notify       → individual plugin "skill-telegram-notify"
#   rule:no-ai-credit           → individual plugin "rule-no-ai-credit"
#   bundle:communication-skills → bundle plugin "bundle-communication-skills"
#
# Reserved names: <prefix>-all (e.g., skill-all, rule-all) are auto-generated
# by Phase 2b of the generator. Defining them here raises a ValueError.
#
# Then run: uv run scripts/generate_manifest.py

# ─── Minimal-stable-state notice ─────────────────────────────────────────────
#
# 2026-05-26: every skill domain bundle and every rule domain bundle was
# removed during the minimal-stable-state refactor (refactor/minimal-stable-state
# branch, see CHANGELOG). Their member plugins were archived to
# docs/archive/{skills,rules}-pre-stable-2026-05-26/. The bundles will be
# re-introduced one at a time as each skill or rule is re-verified on every
# platform and added back to its source directory.
#
# What remains is the cross-construct examples bundle below: one-of-each
# install so a new operator can install every construct type from a single
# command and study the reference implementations. It is intentionally a
# multi-member bundle that does not depend on archived content.

# ─── Cross-construct examples bundle ─────────────────────────────────────────

[bundle.examples]
description = "Reference examples — install to study every construct type"
members = [
  "skill:example",
  "rule:example",
  "command:example",
  "agent:example",
  "hook:example",
  "mcp:example",
  "lsp:example",
  "monitor:example",
  "output-style:example",
  "theme:example",
]

# ─── Per-construct catch-all bundles are NOT declared here ───────────────────
#
# Decision #23: bundle-<prefix>-all (skill-all, rule-all, ..., theme-all)
# is generated by the code (Phase 2b of generate_manifest.py), NOT
# declared in catalog.toml. They have no user-configurable content —
# every catch-all is "every member of that construct" — so configuration
# files have nothing useful to contribute. The generator owns the 10
# reserved names and emits the bundles directly.
#
# Decision #25: load_bundles raises ValueError if catalog tries to define
# a reserved name (e.g., [bundle.skill-all] here raises an error).
