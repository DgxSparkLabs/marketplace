name: Compat — Agent (Claude)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install agent-example-single plugin
        run: claude plugin install agent-example-single@dgxsparklabs-marketplace --scope project

      - name: Assert plugin details shows agents section with notebook-reviewer
        # Match mode: grep substring — catalog row: claude plugin details agent-example-single shows agents section with notebook-reviewer
        run: claude plugin details agent-example-single@dgxsparklabs-marketplace | grep -F "notebook-reviewer"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall agent-example-single --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true

  cursor-emission:
    # Filesystem assertion: after generation, Cursor's per-plugin manifest
    # for agent-example-single must include the "agents" pointer field.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .cursor/agents/notebook-reviewer.md exists
        run: test -f .cursor/agents/notebook-reviewer.md
      - name: Assert .cursor-plugin/plugin.json for agent-example-single includes 'agents' field
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('_generated/agent-example-single/.cursor-plugin/plugin.json'))
          sys.exit(0 if 'agents' in d else 1)
          "

  gemini-emission:
    # Filesystem assertion: .gemini/agents/<n>.md must exist after generation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .gemini/agents/notebook-reviewer.md exists
        run: test -f .gemini/agents/notebook-reviewer.md

  codex-emission:
    # Filesystem assertion: .codex/agents/<n>.toml must exist + parse as valid TOML
    # with the required Codex fields (name, description, developer_instructions).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .codex/agents/notebook-reviewer.toml parses with required fields
        run: |
          python3 -c "
          import tomllib, sys
          d = tomllib.load(open('.codex/agents/notebook-reviewer.toml', 'rb'))
          for k in ('name', 'description', 'developer_instructions'):
              assert k in d, f'missing {k}'
          sys.exit(0)
          "
