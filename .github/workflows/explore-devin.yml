name: explore-devin

on:
  push:
    branches: ["exp/cli-empirical-discovery", "exp/**"]

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Devin CLI
        run: |
          curl -fsSL https://cli.devin.ai/install.sh 2>&1 | bash || echo "INSTALL_EXIT: $?"
          # Also add to PATH in case installer dropped it in ~/bin or similar
          export PATH="$HOME/.local/bin:$HOME/bin:$PATH"
          which devin 2>&1 || find /usr/local/bin /usr/bin $HOME/bin $HOME/.local/bin -name "devin" 2>/dev/null | head -5 || echo "devin not found anywhere"

      - name: Add devin to PATH and check version
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          echo "PATH=$PATH"
          which devin 2>&1 || echo "not in PATH"
          devin --version 2>&1 || echo "EXIT: $?"

      - name: devin --help (no auth)
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin --help 2>&1 || echo "EXIT: $?"

      - name: devin auth --help (auth subcommand shape)
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin auth --help 2>&1 || echo "EXIT: $?"
          devin auth status 2>&1 || echo "EXIT: $?"

      - name: devin skills --help (auth-free?)
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin skills --help 2>&1 || echo "EXIT: $?"
          devin skills list 2>&1 || echo "EXIT: $?"
          devin skills paths 2>&1 || echo "EXIT: $?"

      - name: devin rules --help (auth-free?)
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin rules --help 2>&1 || echo "EXIT: $?"
          devin rules list 2>&1 || echo "EXIT: $?"

      - name: devin mcp --help (auth-free?)
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin mcp --help 2>&1 || echo "EXIT: $?"
          devin mcp list 2>&1 || echo "EXIT: $?"

      - name: Devin config file locations
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          echo "--- ls ~/.devin ---"
          ls -la ~/.devin 2>&1 || echo "no ~/.devin"
          echo "--- ls ~/.config/devin ---"
          ls -la ~/.config/devin 2>&1 || echo "no ~/.config/devin"
          echo "--- ls ~/.local/share/devin ---"
          ls -la ~/.local/share/devin 2>&1 || echo "no ~/.local/share/devin"
          echo "--- Devin binary location ---"
          which devin 2>/dev/null && ls -la $(which devin) || echo "not in PATH"
          echo "--- Try find for devin binary ---"
          find /usr/local /usr/bin $HOME -name "devin" -type f 2>/dev/null | head -10 || echo "find done"

      - name: devin JSON output and remaining subcommands
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
          devin --help 2>&1 | grep -iE 'json|output|format|--[a-z]' || echo "grep found nothing"
          devin config --help 2>&1 || echo "EXIT: $?"
          devin workspace --help 2>&1 || echo "EXIT: $?"
          devin session --help 2>&1 || echo "EXIT: $?"
