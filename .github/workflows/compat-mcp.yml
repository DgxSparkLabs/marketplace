name: Compat — MCP Server (Claude + Devin + Codex + Gemini)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install mcp-example plugin
        run: claude plugin install mcp-example@dgxsparklabs-marketplace --scope project

      - name: Assert plugin details shows mcpServers
        # Match mode: grep substring — catalog row: claude plugin details mentions MCP in human-readable output
        run: claude plugin details mcp-example | grep -iF "mcp"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall mcp-example --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true

  devin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-devin
        id: devin

      - name: Assert Devin MCP list returns exit 0 (baseline)
        # Match mode: exit-code-only — catalog row: devin mcp list exit 0
        working-directory: ${{ github.workspace }}
        run: devin mcp list

      - name: Add example MCP server to Devin
        # Devin has no marketplace concept — MCP servers are added individually
        working-directory: ${{ github.workspace }}
        run: devin mcp add example-fetch -- uvx mcp-server-fetch

      - name: Assert MCP server appears in Devin's list
        # Match mode: grep -i substring (case-insensitive per decision #15)
        working-directory: ${{ github.workspace }}
        run: devin mcp list | grep -i "example-fetch"

  codex:
    # Required per Wave 4 (2026-05-22): org-level block confirmed lifted via 3 consecutive
    # clean CI runs. Codex installs and passes assertions cleanly; promoted from advisory.
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-codex
        id: codex
        with:
          version: 'latest'

      - name: Assert Codex MCP list returns exit 0 (baseline)
        # Match mode: exit-code-only — catalog row: codex mcp list exit 0
        run: codex mcp list

      - name: Add example MCP server to Codex
        run: codex mcp add example-fetch -- uvx mcp-server-fetch

      - name: Assert MCP server appears in Codex list
        # Match mode: grep substring — catalog row: codex mcp list shows each registered MCP
        run: codex mcp list | grep -F "example-fetch"

      - name: Assert codex mcp get returns valid output
        # Match mode: exit-code-only — catalog row: codex mcp get <name> --json exit 0 if exists
        run: codex mcp get example-fetch --json

  gemini:
    # Required per Wave 4 (2026-05-22): org-level block confirmed lifted via 3 consecutive
    # clean CI runs. Gemini installs and passes assertions cleanly; promoted from advisory.
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-gemini
        id: gemini
        with:
          version: 'latest'

      - name: Assert Gemini MCP list returns exit 0 (baseline)
        # Match mode: exit-code-only — catalog row: gemini mcp list exit 0
        run: gemini mcp list

      - name: Add example MCP server to Gemini
        run: gemini mcp add example-fetch uvx mcp-server-fetch

      - name: Assert MCP server appears in Gemini list
        # Match mode: grep substring — catalog row: gemini mcp list shows each server (stderr redirect required: gemini mcp list writes all output to stderr)
        run: gemini mcp list 2>&1 | grep -F "example-fetch"

      - name: Cleanup
        if: always()
        run: gemini mcp remove example-fetch || true
