name: Compat — Gemini Extension

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  gemini:
    # Required per Wave 4 (2026-05-22): org-level block confirmed lifted via 3 consecutive
    # clean CI runs. Generator now emits .gemini/gemini-extension.json; validate step passes.
    # Manifest is generated at .gemini/gemini-extension.json (mirror dir convention) and
    # validated with: gemini extensions validate ./.gemini/
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-gemini
        id: gemini
        with:
          version: 'latest'

      - name: Assert Gemini extensions list returns exit 0 (baseline)
        # Match mode: exit-code-only — catalog row: gemini extensions list exit 0
        run: gemini extensions list

      - name: Validate extension manifest
        # Match mode: exit-code-only — catalog row: gemini extensions validate <path> exit 0 if valid
        # Manifest at .gemini/gemini-extension.json (generated by generate_manifest.py, mirror dir convention).
        run: gemini extensions validate ./.gemini/

      - name: Install extension from local path
        # --consent skips the third-party security acknowledgement prompt.
        # echo "y" answers the workspace-trust prompt that --consent does not suppress for local paths.
        run: echo "y" | gemini extensions install ./.gemini/ --consent

      - name: Assert extension appears in list after install
        # Match mode: grep substring — catalog row: gemini extensions list shows our entry
        # stderr redirect required: gemini extensions list writes output to stderr on Linux (same pattern as gemini mcp list).
        run: gemini extensions list 2>&1 | grep -F "dgxsparklabs"

      - name: Cleanup
        if: always()
        run: gemini extensions uninstall dgxsparklabs-marketplace || true
