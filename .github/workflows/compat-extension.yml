name: Compat — Gemini Extension

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  gemini:
    # Advisory — two reasons this job is continue-on-error:
    # 1. @google/gemini-cli is blocked by GitHub Actions org policy (fails at install time).
    # 2. Generator does not yet emit gemini-extension.json; validate step will fail until it does.
    # When the org policy block lifts AND the generator emits the manifest, this job turns green
    # automatically with zero code changes (per decisions #10 and #20).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-gemini
        id: gemini
        with:
          version: 'latest'

      - name: Assert Gemini extensions list returns exit 0 (baseline)
        # Match mode: exit-code-only — catalog row: gemini extensions list exit 0
        run: gemini extensions list

      - name: Validate extension manifest
        # Match mode: exit-code-only — catalog row: gemini extensions validate <path> exit 0 if valid
        # Requires generator to emit gemini-extension.json in a future update.
        # Currently: "Configuration file not found at <path>/gemini-extension.json" (advisory).
        run: gemini extensions validate ./

      - name: Assert extension appears in list after install
        # Match mode: grep substring — catalog row: gemini extensions list shows our entry
        run: gemini extensions list | grep -F "dgxsparklabs"
