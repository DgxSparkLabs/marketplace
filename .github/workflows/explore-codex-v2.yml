name: explore-codex-v2

on:
  push:
    branches: ["exp/cli-empirical-discovery", "exp/**"]

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Codex CLI
        run: npm install -g @openai/codex 2>&1 | tail -5 || echo "INSTALL_EXIT: $?"

      - name: codex --version
        run: codex --version 2>&1 || echo "EXIT: $?"

      - name: codex --help
        run: codex --help 2>&1 || echo "EXIT: $?"

      - name: codex --print-config
        run: codex --print-config 2>&1 || echo "EXIT: $?"

      - name: codex mcp --help
        run: codex mcp --help 2>&1 || echo "EXIT: $?"

      - name: codex mcp list (auth-free?)
        run: codex mcp list 2>&1 || echo "EXIT: $?"

      - name: codex skills --help
        run: codex skills --help 2>&1 || echo "EXIT: $?"

      - name: codex features list
        run: codex features list 2>&1 || echo "EXIT: $?"

      - name: codex execpolicy --help
        run: codex execpolicy --help 2>&1 || echo "EXIT: $?"

      - name: codex agents --help
        run: codex agents --help 2>&1 || echo "EXIT: $?"

      - name: codex config --help
        run: codex config --help 2>&1 || echo "EXIT: $?"

      - name: codex --list-commands or similar introspection
        run: |
          codex list 2>&1 || echo "EXIT: $?"
          codex commands 2>&1 || echo "EXIT: $?"
          codex help 2>&1 || echo "EXIT: $?"

      - name: Locate codex config/skill/rule file paths
        run: |
          echo "--- which codex ---"
          which codex || echo "not found"
          echo "--- ls ~/.codex ---"
          ls ~/.codex 2>&1 || echo "no ~/.codex dir"
          echo "--- ls ~/.config/codex ---"
          ls ~/.config/codex 2>&1 || echo "no ~/.config/codex"
          echo "--- ls /usr/local/lib/node_modules/@openai/codex ---"
          ls /usr/local/lib/node_modules/@openai/codex 2>&1 | head -20 || echo "not there"
          echo "--- package.json version ---"
          cat /usr/local/lib/node_modules/@openai/codex/package.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('version:', d.get('version')); print('bin:', d.get('bin')); print('keywords:', d.get('keywords','')[:200])" || echo "no package.json"

      - name: codex JSON/structured output flags
        run: |
          codex --help 2>&1 | grep -iE 'json|output|format|--[a-z]' || echo "grep failed"
