name: Compat — Output Style (Claude)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install output-style-example-single plugin
        run: claude plugin install output-style-example-single@dgxsparklabs-marketplace --scope project

      - name: Assert plugin is listed (grep match)
        # Match mode: grep substring — catalog row: claude plugin list shows installed entry
        run: claude plugin list | grep -F "output-style-example-single@dgxsparklabs-marketplace"

      - name: Assert plugin details shows output styles section
        # Match mode: grep substring — catalog row: claude plugin details shows the relevant section
        run: claude plugin details output-style-example-single@dgxsparklabs-marketplace | grep -F "output-style-example-single"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall output-style-example-single --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true
