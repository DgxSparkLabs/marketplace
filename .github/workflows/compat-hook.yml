name: Compat — Hook (Claude + Gemini migration check)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install hook-example-multi plugin
        run: claude plugin install hook-example-multi@dgxsparklabs-marketplace --scope project

      - name: Assert plugin details shows hooks section with UserPromptSubmit entry
        # Match mode: grep substring — catalog row: claude plugin details hook-example-multi shows hooks section including UserPromptSubmit entry
        run: claude plugin details hook-example-multi@dgxsparklabs-marketplace | grep -F "UserPromptSubmit"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall hook-example-multi --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true

  cursor-emission:
    # Filesystem assertion: Cursor's per-plugin manifest for hook-example-multi
    # must include the "hooks" pointer field.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .cursor-plugin/plugin.json for hook-example-multi includes 'hooks' field
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('_generated/hook-example-multi/.cursor-plugin/plugin.json'))
          sys.exit(0 if 'hooks' in d else 1)
          "

  gemini-emission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .gemini/hooks/hooks.json exists and is valid JSON
        run: |
          python3 -c "
          import json
          json.load(open('.gemini/hooks/hooks.json'))
          "

  windsurf-emission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .windsurf/hooks.json exists and is valid JSON
        run: |
          python3 -c "
          import json
          json.load(open('.windsurf/hooks.json'))
          "

