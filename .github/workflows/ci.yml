name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Validate generated manifests are in sync with sources
        run: uv run scripts/generate_manifest.py --check

      - name: Run marketplace test suite
        run: uv run tests/test_marketplace.py -v

      - name: Run schema-fitness test suite
        run: uv run tests/test_schema_fitness.py

      - name: Run agents CLI test suite
        run: uv run tests/test_agents_cli.py

      - name: Run contributor-tooling test suite
        run: uv run tests/test_tooling.py
