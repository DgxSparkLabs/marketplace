name: Compat — Theme (Claude)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install theme-example plugin
        run: claude plugin install theme-example@dgxsparklabs-marketplace --scope project

      - name: Assert plugin is listed (grep match)
        # Match mode: grep substring — catalog row: claude plugin list shows installed entry
        run: claude plugin list | grep -F "theme-example@dgxsparklabs-marketplace"

      - name: Assert plugin details shows themes section
        # Match mode: grep substring — catalog row: claude plugin details shows the relevant section
        run: claude plugin details theme-example | grep -F "theme-example"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall theme-example --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true
