name: Compat — Command (Claude)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install example-command plugin
        run: claude plugin install example-command@dgxsparklabs-marketplace --scope project

      - name: Assert plugin is listed (grep match)
        # Match mode: grep substring — catalog row: claude plugin list → shows installed entry
        run: claude plugin list | grep -F "example-command@dgxsparklabs-marketplace"

      - name: Assert plugin details shows commands section
        # Match mode: grep substring — catalog row: claude plugin details shows commands section with one entry
        run: claude plugin details example-command | grep -F "example-command"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall example-command --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true
