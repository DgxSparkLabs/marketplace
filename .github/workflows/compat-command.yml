name: Compat — Command (Claude)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Regenerate manifests from sources
        run: uv run scripts/generate_manifest.py

      - uses: ./.github/actions/setup-claude
        id: claude

      - name: Register marketplace
        run: claude plugin marketplace add ./

      - name: Install command-example-single plugin
        run: claude plugin install command-example-single@dgxsparklabs-marketplace --scope project

      - name: Assert plugin is listed (grep match)
        # Match mode: grep substring — catalog row: claude plugin list → shows installed entry
        run: claude plugin list | grep -F "command-example-single@dgxsparklabs-marketplace"

      - name: Assert plugin details shows commands section
        # Match mode: grep substring — catalog row: claude plugin details shows commands section with one entry
        run: claude plugin details command-example-single@dgxsparklabs-marketplace | grep -F "command-example-single"

      - name: Cleanup
        if: always()
        run: |
          claude plugin uninstall command-example-single --scope project || true
          claude plugin prune --scope project -y || true
          claude plugin marketplace remove dgxsparklabs-marketplace || true

  cursor-emission:
    # Filesystem assertion: Cursor's per-plugin manifest for command-example-single
    # must include the "commands" pointer field (Cursor 2.4+ schema).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Regenerate manifests
        run: uv run scripts/generate_manifest.py
      - name: Assert .cursor-plugin/plugin.json for command-example-single includes 'commands' field
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('_generated/command-example-single/.cursor-plugin/plugin.json'))
          sys.exit(0 if 'commands' in d else 1)
          "
