name: 'Setup Gemini CLI'
description: 'Install the Google Gemini CLI and verify it is available'

inputs:
  version:
    description: 'CLI version to install. Default: latest'
    default: 'latest'
    required: false

outputs:
  installed:
    description: 'Boolean — true if the CLI binary is available after setup'
    value: ${{ steps.verify.outputs.installed }}

runs:
  using: 'composite'
  steps:
    - name: Install Gemini CLI
      shell: bash
      run: |
        # NOTE: @google/gemini-cli is blocked by GitHub Actions org policy.
        # This step will fail with a 0-second policy error on github.com-hosted runners.
        # The job has continue-on-error: true to make this advisory.
        # When the GitHub whitelist lands, this install will succeed automatically.
        npm install -g @google/gemini-cli@${{ inputs.version }}

    - name: Verify installation
      id: verify
      shell: bash
      run: |
        if gemini --version; then
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
